# /etc/nginx/sites-available/joaoasocialmedia.com.br
#
# Instalação (na VPS, como root ou com sudo):
#   1. sudo cp joaoasocialmedia.com.br.conf /etc/nginx/sites-available/joaoasocialmedia.com.br
#   2. sudo ln -s /etc/nginx/sites-available/joaoasocialmedia.com.br /etc/nginx/sites-enabled/
#   3. confirme que index.html + assets/ já estão em /home/marquin/var/www/joaoasocialmedia
#   4. dê permissão de leitura/travessia pro Nginx chegar até a pasta (ver nota abaixo)
#   5. sudo nginx -t          # valida a sintaxe antes de recarregar
#   6. sudo systemctl reload nginx
#   7. curl -I http://joaoasocialmedia.com.br     # confirma que o HTTP responde
#
# NOTA — permissões por estar dentro do $HOME:
#   O usuário do worker do Nginx (normalmente www-data) precisa de permissão
#   de execução (x) em CADA diretório do caminho até o site, senão dá 403:
#     chmod o+x /home/marquin /home/marquin/var /home/marquin/var/www
#   E os arquivos do site precisam ser legíveis por outros:
#     chmod -R o+rX /home/marquin/var/www/joaoasocialmedia
#   Alternativa mais limpa: mover o site pra /var/www/joaoasocialmedia.com.br
#   (fora do $HOME) e ajustar o `root` abaixo — evita mexer em permissão do $HOME.
#
# Depois que o HTTP acima estiver OK (e o DNS já resolvendo pro IP da VPS),
# rode o Certbot pra emitir o certificado e ele mesmo edita este arquivo,
# adicionando o bloco 443/SSL e o redirect HTTP -> HTTPS:
#
#   sudo apt update && sudo apt install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d joaoasocialmedia.com.br -d www.joaoasocialmedia.com.br
#
# O Certbot também configura a renovação automática (systemd timer certbot.timer).
# Não force o redirect pra HTTPS manualmente antes disso — deixe o Certbot cuidar.

server {
    listen 80;
    listen [::]:80;
    server_name joaoasocialmedia.com.br www.joaoasocialmedia.com.br;

    root /home/marquin/var/www/joaoasocialmedia;
    index index.html;

    # ---- Compressão ----
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ---- Headers de segurança básicos ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ---- HTML: sempre revalidar (evita cache de versão antiga do site) ----
    location = / {
        try_files /index.html =404;
        add_header Cache-Control "no-cache";
    }
    location ~ \.html$ {
        add_header Cache-Control "no-cache";
    }

    # ---- Imagens/CSS/JS versionados: cache longo ----
    location ~* \.(?:css|js|jpg|jpeg|png|gif|svg|webp|ico|woff2?|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    # ---- Vídeos: streaming com suporte a seek (mp4 module) ----
    location ~* \.mp4$ {
        mp4;
        mp4_buffer_size 1m;
        mp4_max_buffer_size 5m;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }
    # .MOV não é suportado pelo módulo mp4 do Nginx; serve como arquivo estático comum
    location ~* \.mov$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # bloqueia acesso a arquivos ocultos (.git, .env, etc.)
    location ~ /\. {
        deny all;
    }
}
